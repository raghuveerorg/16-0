name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Sync + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-next

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync game assets (web → web-next)
        run: npm run sync

      - name: Run backend tests
        run: npm test
